name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip project if a zip was uploaded instead of raw files
        run: |
          if [ ! -f "settings.gradle.kts" ]; then
            ZIP_FILE=$(find . -maxdepth 1 -iname "*.zip" | head -n 1)
            if [ -n "$ZIP_FILE" ]; then
              echo "Found $ZIP_FILE, extracting..."
              unzip -q "$ZIP_FILE" -d _extracted
              INNER_DIR=$(find _extracted -maxdepth 1 -mindepth 1 -type d | head -n 1)
              cp -r "$INNER_DIR"/. .
            fi
          fi
          ls -la

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew || true

      - name: Generate Gradle wrapper (if missing)
        run: gradle wrapper --gradle-version 8.7 || true

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cams-attendance-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
